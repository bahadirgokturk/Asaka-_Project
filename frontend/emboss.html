<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Asakai — Emboss</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Emboss Takibi</div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="showModal('modal-ekle')">+ Yeni Kayıt</button>
      </div>
    </div>
    <div class="page">
      <div class="lok-tabs" id="lok-tabs"></div>
      <div class="filter-bar">
        <label>Başlangıç:</label><input type="date" id="f-bas" style="width:145px">
        <label>Bitiş:</label><input type="date" id="f-bit" style="width:145px">
        <button class="btn btn-secondary btn-sm" onclick="yukle()">Filtrele</button>
        <button class="btn btn-secondary btn-sm" onclick="buHafta()">Bu Hafta</button>
      </div>
      <div class="grid grid-4" id="ozet" style="margin-bottom:20px"></div>
      <div class="card">
        <div class="card-title">Emboss Kayıtları</div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Tarih</th>
              <th class="td-num">Emboss Hedef</th><th class="td-num">Emboss Gerçek</th>
              <th class="td-num">Cellaxy Hedef</th><th class="td-num">Cellaxy Gerçek</th>
              <th>Sapma Nedeni</th><th>Bozulan Açıklama</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-ekle" style="display:none">
  <div class="modal">
    <div class="modal-header"><h3>Emboss Kaydı</h3><button class="modal-close" onclick="hideModal('modal-ekle')">✕</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-grid form-grid-2">
          <div class="form-group"><label>Tarih</label><input type="date" id="f-tarih"></div>
          <div class="form-group"><label>Lokasyon</label>
            <select id="f-lok"><option value="1">Çiğli</option><option value="2">ESBAŞ</option><option value="3">Karaman</option></select>
          </div>
        </div>
        <div class="form-grid form-grid-2">
          <div class="form-group"><label>Emboss Hedef</label><input type="number" id="f-eh" min="0" value="0"></div>
          <div class="form-group"><label>Emboss Gerçek</label><input type="number" id="f-eg" min="0" value="0"></div>
        </div>
        <div class="form-grid form-grid-2">
          <div class="form-group"><label>Cellaxy Hedef</label><input type="number" id="f-ch" min="0" value="0"></div>
          <div class="form-group"><label>Cellaxy Gerçek</label><input type="number" id="f-cg" min="0" value="0"></div>
        </div>
        <div class="form-group"><label>Sapma Nedeni</label><textarea id="f-sapma"></textarea></div>
        <div class="form-group"><label>Bozulan Açıklama</label><textarea id="f-bozulan"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="hideModal('modal-ekle')">İptal</button>
      <button class="btn btn-primary" onclick="kaydet()">Kaydet</button>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script>
renderSidebar();
document.getElementById('f-tarih').value = bugun();
const bas=document.getElementById('f-bas'),bit=document.getElementById('f-bit');
bas.value=haftaBaslangic();bit.value=haftaBitis();
function buHafta(){bas.value=haftaBaslangic();bit.value=haftaBitis();yukle();}
initLokTabs('lok-tabs',()=>yukle());
async function yukle(){
  const p=new URLSearchParams({lokasyon_id:secilenLokasyon,baslangic:bas.value,bitis:bit.value});
  const data=await get('/emboss?'+p);if(!data)return;
  const te=data.reduce((s,r)=>s+(r.emboss_hedef||0),0),ge=data.reduce((s,r)=>s+(r.emboss_gercek||0),0);
  const tc=data.reduce((s,r)=>s+(r.cellaxy_hedef||0),0),gc=data.reduce((s,r)=>s+(r.cellaxy_gercek||0),0);
  document.getElementById('ozet').innerHTML=`
    <div class="metric-card"><div class="metric-label">Emboss Hedef</div><div class="metric-value">${te}</div></div>
    <div class="metric-card"><div class="metric-label">Emboss Gerçek</div><div class="metric-value">${ge}</div></div>
    <div class="metric-card"><div class="metric-label">Cellaxy Hedef</div><div class="metric-value">${tc}</div></div>
    <div class="metric-card"><div class="metric-label">Cellaxy Gerçek</div><div class="metric-value">${gc}</div></div>
  `;
  document.getElementById('tbody').innerHTML=data.length===0?'<tr><td colspan="7" class="td-center" style="padding:20px;color:var(--text3)">Kayıt yok</td></tr>'
    :data.map(r=>`<tr>
      <td><strong>${formatTarih(r.tarih)}</strong></td>
      <td class="td-num">${r.emboss_hedef??'-'}</td>
      <td class="td-num ${sapmaClass(r.emboss_hedef,r.emboss_gercek)}">${r.emboss_gercek??'-'}</td>
      <td class="td-num">${r.cellaxy_hedef??'-'}</td>
      <td class="td-num ${sapmaClass(r.cellaxy_hedef,r.cellaxy_gercek)}">${r.cellaxy_gercek??'-'}</td>
      <td style="font-size:12px;max-width:180px">${r.sapma_nedeni||'-'}</td>
      <td style="font-size:12px;max-width:180px">${r.bozulan_aciklama||'-'}</td>
    </tr>`).join('');
}
async function kaydet(){
  const kayit={
    tarih:document.getElementById('f-tarih').value,
    lokasyon_id:parseInt(document.getElementById('f-lok').value),
    emboss_hedef:parseInt(document.getElementById('f-eh').value)||0,
    emboss_gercek:parseInt(document.getElementById('f-eg').value)||0,
    cellaxy_hedef:parseInt(document.getElementById('f-ch').value)||0,
    cellaxy_gercek:parseInt(document.getElementById('f-cg').value)||0,
    sapma_nedeni:document.getElementById('f-sapma').value||null,
    bozulan_aciklama:document.getElementById('f-bozulan').value||null
  };
  if(!kayit.tarih)return showToast('Tarih giriniz!','danger');
  const res=await post('/emboss',kayit);
  if(res){showToast('Kaydedildi','success');hideModal('modal-ekle');yukle();}
}
setupModalClose();yukle();
</script>
</body>
</html>
